name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: python

  build-and-attach:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --all-extras --all-groups

      - name: Build installers
        run: uv run python build.py

      - name: Prepare release table
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $files = Get-ChildItem "dist" -Filter "*.exe"
          if (-not $files) {
            throw "No executables found in dist/"
          }

          $rows = @("| Client | Download |", "| --- | --- |")
          foreach ($file in $files) {
            $client = $file.BaseName -replace '^autoUFL_', ''
            $url = "https://github.com/$env:REPOSITORY/releases/download/$env:TAG_NAME/$($file.Name)"
            $rows += "| $client | [$($file.Name)]($url) |"
          }

          $table = ($rows -join "`n").Trim()
          $tableBody = @(
            "## Downloadable Installers",
            "",
            $table
          ) -join "`n"

          $tablePath = Join-Path (Get-Location) "build/release-table.md"
          New-Item -ItemType Directory -Force -Path (Split-Path $tablePath) | Out-Null
          $tableBody | Out-File -FilePath $tablePath -Encoding utf8

      - name: Upload installers to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe
          tag_name: ${{ needs.release.outputs.tag_name }}
          append_body: true
          body_path: build/release-table.md
