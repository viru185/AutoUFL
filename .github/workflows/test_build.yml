name: Dev Build & Test

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --all-extras --all-groups

      - name: Build installers
        run: uv run python build.py

      - name: Prepare release body
        shell: pwsh
        env:
          TAG_NAME: v0.0.0-dev-test
          REPOSITORY: ${{ github.repository }}
        run: |
          $files = Get-ChildItem "dist" -Filter "*.exe"
          if (-not $files) {
            throw "No executables found in dist/"
          }

          $rows = @("| Client | Download |", "| --- | --- |")
          foreach ($file in $files) {
            $client = $file.BaseName -replace '^autoUFL_', ''
            $url = "https://github.com/$env:REPOSITORY/releases/download/$env:TAG_NAME/$($file.Name)"
            $rows += "| $client | [$($file.Name)]($url) |"
          }

          $bodyLines = @(
            "Automated test build from dev branch. Includes per-client installers.",
            "",
            $rows -join "`n"
          )

          $body = ($bodyLines -join "`n").Trim()
          $bodyPath = Join-Path (Get-Location) "build/test-release-body.md"
          New-Item -ItemType Directory -Force -Path (Split-Path $bodyPath) | Out-Null
          $body | Out-File -FilePath $bodyPath -Encoding utf8

      - name: Upload installers to test release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe
          tag_name: v0.0.0-dev-test
          body_path: build/test-release-body.md
          prerelease: true
