name: Dev Build & Test

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --all-extras --all-groups

      - name: Build installers
        run: uv run python build.py

      - name: Prepare release body
        shell: bash
        env:
          TAG_NAME: v0.0.0-dev-test
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(dist/*.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No executables found in dist/" >&2
            exit 1
          fi

          mkdir -p build
          output="build/test-release-body.md"

          {
            echo "Automated test build from dev branch. Includes per-client installers."
            echo
            echo "| Client | Download |"
            echo "| --- | --- |"
            for path in "${files[@]}"; do
              file_name="$(basename "$path")"
              client="${file_name#autoUFL_}"
              client="${client%.exe}"
              url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${file_name}"
              echo "| ${client} | [${file_name}](${url}) |"
            done
          } > "${output}"

      - name: Upload installers to test release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe
          tag_name: v0.0.0-dev-test
          body_path: build/test-release-body.md
          prerelease: true
